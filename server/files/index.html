<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movies!</title>
    <style>
        /* Part 3: Your styling goes here */
    body {
        font-family: Arial, sans-serif;
        background-color: #f6f7fb;
        margin: 0;
        padding: 20px;

        display: flex;
        flex-direction: column;
        align-items: center;
    }

    article {
        background-color: white;
        width: 100%;
        max-width: 400px;
        margin: 12px 0;
        border-radius: 14px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        overflow: hidden;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
        display: flex;
        flex-direction: column;
    }

    img {
        width: 180px;
        height: auto;
        object-fit: cover;
        display: block;
        margin: 15px auto 0 auto;
    }


    article:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 24px rgba(0,0,0,0.16);
    }

    h1 {
        font-size: 20px;
        margin: 10px 15px;
    }

    p {
        font-size: 14px;
        margin: 8px 15px;
        line-height: 1.6;  
        color: #444;
    }

    .plot {
        font-style: italic;
        font-size: 13px;
        line-height: 1.4;
        color: #555;
    }

    .genre {
        display: inline-block;
        background-color: #e0e7ff;
        color: #3730a3;
        padding: 4px 8px;
        margin: 5px 5px 10px 15px;
        border-radius: 6px;
        font-size: 12px;
    }

    @media (max-width: 600px) {
        article {
            flex-direction: column;
        }

        img {
            width: 100%;
            height: 300px;
        }
    }
    </style>
    <link rel="stylesheet" href="index.css" />
    <script src="index.js"></script>
  </head>

  <body>
  </body>
</html>
