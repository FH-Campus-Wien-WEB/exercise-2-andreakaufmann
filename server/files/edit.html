<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Movie</title>
    <link rel="stylesheet" href="edit.css">
    <link rel="stylesheet" href="base.css">
</head>
<body>
    <form>
        <input type="hidden" id="imdbID">

        <div>
            <label for="Title">Title:</label>
            <input type="text" id="Title" name="title" required>
        </div>

        <div>
            <label for="Released">Released:</label>
            <input type="date" id="Released" name="released" required>
        </div>

        <div>
            <label for="Runtime">Runtime (minutes):</label>
            <input type="number" id="Runtime" name="runtime" required>
         </div>

         <div>
            <label for="Directors">Directors:</label>
            <input type="text" id="Directors" name="directors" required>
         </div>

         <div>
            <label for="Writers">Writers:</label>
            <input type="text" id="Writers" name="writers" required>
        </div>

        <div>
            <label for="Actors">Actors:</label>
            <input type="text" id="Actors" name="actors" required>
        </div>

        <div>
            <label for="Poster">Poster URL:</label>
            <input type="url" id="Poster" name="poster" required>
        </div>

        <div>
            <label for="Metascore">Metascore:</label>
            <input type="number" id="Metascore" name="metascore" min="0" max="100" required>
        </div>

        <div>
            <label for="imdbRating">IMDb Rating:</label>
            <input type="number" id="imdbRating" name="imdbRating" min="0" max="10" step="0.1" required>
        </div>

        <div>
            <label for="Genre">Genre:</label>
            <select name="genre" id="Genre" required>
                <option value="">Select a genre</option>
                <option value="Action">Action</option>
                <option value="Adventure">Adventure</option>
                <option value="Animation">Animation</option>
                <option value="Comedy">Comedy</option>
                <option value="Crime">Crime</option>
                <option value="Drama">Drama</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Horror">Horror</option>
                <option value="Sci-Fi">Sci-Fi</option>
                <option value="Thriller">Thriller</option>
                <option value="Western">Western</option>
            </select>
        </div>

        <div>
            <label for="Plot">Plot:</label>
            <textarea id="Plot" name="plot" required></textarea>
        </div>

        <div>
            <button type="button" onclick="putMovie()">Save Changes</button>
            <button type="button" onclick="location.href='index.html'">Cancel</button>
        </div>

    </form>

    <script src="edit.js"></script>
    
</body>
</html>
